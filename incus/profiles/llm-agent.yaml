name: llm-agent
description: |
  Base profile for containers running LLM coding agents and CLI tools.
  Security defaults, resource caps, no autostart.
  Compose with `gpu-nvidia` and `bind-mountable`.

  Launch: incus launch images:archlinux <name> -p default -p llm-agent -p gpu-nvidia -p bind-mountable

config:
  security.privileged: "false"
  security.nesting: "false"

  limits.cpu: "8"
  limits.memory: 16GiB

  boot.autostart: "false"
